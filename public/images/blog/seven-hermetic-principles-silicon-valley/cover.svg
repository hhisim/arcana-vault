<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg6" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <linearGradient id="circuit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#4ECDC4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg6)"/>
  <!-- Hermetic Eye of Providence (gold) -->
  <g transform="translate(600,220)" opacity="0.5">
    <path d="M-80,20 Q0,-60 80,20 Q0,10 -80,20" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <circle r="25" fill="none" stroke="#C9A84C" stroke-width="1"/>
    <circle r="8" fill="#C9A84C" opacity="0.6"/>
    <!-- Rays -->
    <line x1="0" y1="-55" x2="0" y2="-90" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
    <line x1="55" y1="-28" x2="80" y2="-50" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
    <line x1="55" y1="5" x2="80" y2="5" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
    <line x1="-55" y1="-28" x2="-80" y2="-50" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
    <line x1="-55" y1="5" x2="-80" y2="5" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
  </g>
  <!-- Circuit board lines (Silicon Valley) -->
  <g stroke="url(#circuit)" stroke-width="0.8" opacity="0.2" fill="none">
    <!-- Horizontal lines -->
    <line x1="50" y1="350" x2="450" y2="350"/>
    <line x1="750" y1="350" x2="1150" y2="350"/>
    <line x1="50" y1="420" x2="300" y2="420"/>
    <line x1="900" y1="420" x2="1150" y2="420"/>
    <line x1="50" y1="500" x2="250" y2="500"/>
    <line x1="950" y1="500" x2="1150" y2="500"/>
    <!-- Vertical connectors -->
    <line x1="450" y1="350" x2="450" y2="500"/>
    <line x1="750" y1="350" x2="750" y2="500"/>
    <line x1="600" y1="300" x2="600" y2="350"/>
    <!-- Circuit nodes -->
    <circle cx="50" cy="350" r="3" fill="#C9A84C" opacity="0.4"/>
    <circle cx="450" cy="350" r="3" fill="#C9A84C" opacity="0.4"/>
    <circle cx="750" cy="350" r="3" fill="#C9A84C" opacity="0.4"/>
    <circle cx="1150" cy="350" r="3" fill="#C9A84C" opacity="0.4"/>
    <circle cx="300" cy="420" r="2" fill="#4ECDC4" opacity="0.4"/>
    <circle cx="900" cy="420" r="2" fill="#4ECDC4" opacity="0.4"/>
  </g>
  <!-- As Above So Below text -->
  <text x="600" y="560" text-anchor="middle" font-family="serif" font-size="14" fill="#C9A84C" opacity="0.5" letter-spacing="3">AS ABOVE · SO BELOW</text>
  <text x="600" y="590" text-anchor="middle" font-family="serif" font-size="9" fill="#9B93AB" opacity="0.4" letter-spacing="2">Seven Hermetic Principles · Recursion · Emergence</text>
</svg>
