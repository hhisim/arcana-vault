<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg7" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg7)"/>
  <!-- Yin-Yang with quantum wave function overlay -->
  <g transform="translate(600,300)">
    <!-- Outer ring -->
    <circle r="200" fill="none" stroke="#2d5a3d" stroke-width="0.5" opacity="0.3"/>
    <circle r="160" fill="none" stroke="#2d5a3d" stroke-width="0.5" opacity="0.2"/>
    <!-- Yin-yang base -->
    <g opacity="0.4">
      <path d="M0,-120 A60,60 0 0,1 0,120 A120,120 0 0,1 0,-120" fill="#2d5a3d"/>
      <path d="M0,120 A60,60 0 0,1 0,-120 A120,120 0 0,1 0,120" fill="#0a0f1a"/>
      <circle cx="0" cy="-60" r="20" fill="#2d5a3d"/>
      <circle cx="0" cy="60" r="20" fill="#0a0f1a" stroke="#2d5a3d" stroke-width="2"/>
    </g>
    <!-- Quantum wave function lines -->
    <g stroke="#4ECDC4" stroke-width="0.5" opacity="0.15" fill="none">
      <path d="M-200,0 Q-100,-80 0,0 Q100,80 200,0"/>
      <path d="M-200,40 Q-100,-40 0,40 Q100,120 200,40"/>
      <path d="M-200,-40 Q-100,80 0,-40 Q100,-160 200,-40"/>
      <path d="M-200,80 Q-100,0 0,80 Q100,160 200,80"/>
      <path d="M-200,-80 Q-100,40 0,-80 Q100,-200 200,-80"/>
    </g>
  </g>
  <!-- Label -->
  <text x="600" y="50" text-anchor="middle" font-family="serif" font-size="11" fill="#2d5a3d" opacity="0.7" letter-spacing="4">✦ TAO · QUANTUM ✦</text>
  <text x="600" y="585" text-anchor="middle" font-family="serif" font-size="9" fill="#9B93AB" opacity="0.4" letter-spacing="2">wu wei · superposition · interdependence</text>
</svg>
