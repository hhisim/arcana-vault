<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg12" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <radialGradient id="emerald12" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#50C878" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#50C878" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="axiom12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#50C878"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <filter id="glow12">
      <feGaussianBlur stdDeviation="4" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg12)"/>
  <!-- Emerald Tablet text suggestion -->
  <g transform="translate(600,280)" opacity="0.3">
    <circle r="220" fill="none" stroke="#50C878" stroke-width="0.5"/>
    <circle r="180" fill="none" stroke="#50C878" stroke-width="0.5"/>
    <circle r="140" fill="none" stroke="#50C878" stroke-width="0.5"/>
  </g>
  <!-- Emerald tablet shape (rectangular with rounded corners) -->
  <g transform="translate(600,300)" filter="url(#glow12)" opacity="0.5">
    <rect x="-100" y="-140" width="200" height="240" rx="8" fill="none" stroke="#50C878" stroke-width="1.5"/>
    <rect x="-90" y="-130" width="180" height="220" rx="4" fill="#0a1a0a" opacity="0.8"/>
    <!-- 7 axiom lines -->
    <line x1="-70" y1="-100" x2="70" y2="-100" stroke="#50C878" stroke-width="0.5" opacity="0.6"/>
    <line x1="-70" y1="-70" x2="70" y2="-70" stroke="#50C878" stroke-width="0.5" opacity="0.6"/>
    <line x1="-70" y1="-40" x2="70" y2="-40" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
    <line x1="-70" y1="-10" x2="70" y2="-10" stroke="#50C878" stroke-width="0.5" opacity="0.6"/>
    <line x1="-70" y1="20" x2="70" y2="20" stroke="#50C878" stroke-width="0.5" opacity="0.6"/>
    <line x1="-70" y1="50" x2="70" y2="50" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
    <line x1="-70" y1="80" x2="70" y2="80" stroke="#50C878" stroke-width="0.5" opacity="0.6"/>
  </g>
  <!-- Hermetic axiom: As Above So Below -->
  <g transform="translate(600,300)" opacity="0.15">
    <circle r="280" fill="url(#emerald12)"/>
    <path d="M-200,-140 L200,-140 L200,140 L-200,140 Z" fill="none" stroke="#50C878" stroke-width="0.3"/>
  </g>
  <text x="600" y="50" text-anchor="middle" font-family="serif" font-size="11" fill="#50C878" opacity="0.7" letter-spacing="4">✦ EMERALD TABLET ✦</text>
  <text x="600" y="585" text-anchor="middle" font-family="serif" font-size="9" fill="#C9A84C" opacity="0.4" letter-spacing="2">TABULA SMARAGDINA · HERMES TRISMEGISTUS · THOTH</text>
</svg>
