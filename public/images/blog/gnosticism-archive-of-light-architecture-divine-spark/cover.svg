<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#2a1a40"/>
      <stop offset="60%" stop-color="#12101a"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <radialGradient id="light-beam" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#FFFDE7" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#C9A84C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="archy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7B5EA7" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="6" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <!-- Light beam from above (Pleroma) -->
  <path d="M600,0 L750,250 L450,250 Z" fill="url(#light-beam)" opacity="0.4"/>
  <path d="M600,0 L700,200 L500,200 Z" fill="#FFFDE7" opacity="0.15"/>
  <!-- 7 concentric circles (7 heavens/archons) -->
  <g transform="translate(600,280)" opacity="0.25">
    <circle r="280" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
    <circle r="240" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
    <circle r="200" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
    <circle r="160" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
    <circle r="120" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
    <circle r="80" fill="none" stroke="#7B5EA7" stroke-width="1"/>
  </g>
  <!-- Divine spark descending -->
  <g transform="translate(600,280)" filter="url(#blur-glow)">
    <circle r="40" fill="#FFFDE7" opacity="0.1"/>
    <circle r="20" fill="#FFFDE7" opacity="0.3"/>
    <circle r="8" fill="#FFFDE7" opacity="0.9"/>
  </g>
  <!-- Archon barrier rings -->
  <g transform="translate(600,400)" opacity="0.15">
    <ellipse rx="500" ry="80" fill="none" stroke="#7B5EA7" stroke-width="2"/>
    <ellipse rx="400" ry="60" fill="none" stroke="#7B5EA7" stroke-width="1"/>
    <ellipse rx="300" ry="40" fill="none" stroke="#7B5EA7" stroke-width="1"/>
  </g>
  <!-- Label: PLEROMA -->
  <text x="600" y="60" text-anchor="middle" font-family="serif" font-size="11" fill="#C9A84C" opacity="0.6" letter-spacing="4">✦ PLEROMA ✦</text>
  <!-- Label: ARCHONS -->
  <text x="600" y="560" text-anchor="middle" font-family="serif" font-size="11" fill="#7B5EA7" opacity="0.5" letter-spacing="4">— ARCHONS —</text>
</svg>
